<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Solution Ultime Clavier iOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: #007AFF;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }
        
        .editor-container {
            flex: 1;
            padding: 15px;
            background: white;
            position: relative;
            min-height: 0;
        }
        
        textarea {
            width: 100%;
            height: 100%;
            border: 2px solid #007AFF;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }
        
        /* SOLUTION 1: Toolbar qui suit le visual viewport */
        .toolbar-viewport {
            position: fixed;
            left: 0;
            right: 0;
            background: #007AFF;
            color: white;
            padding: 12px 15px;
            z-index: 9999;
            transition: bottom 0.3s ease;
            /* Par défaut en bas */
            bottom: 0;
        }
        
        /* SOLUTION 2: Toolbar dans le flux normal */
        .toolbar-flow {
            background: #34C759;
            color: white;
            padding: 12px 15px;
            flex-shrink: 0;
            order: 999;
        }
        
        .toolbar-buttons {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
        }
        
        .toolbar button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 36px;
        }
        
        .toolbar button:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.95);
        }
        
        .info {
            background: #333;
            color: white;
            padding: 8px 15px;
            font-family: monospace;
            font-size: 11px;
            flex-shrink: 0;
        }
        
        /* Styles pour différents états */
        .keyboard-open .main-container {
            /* Ajuster quand clavier ouvert */
        }
        
        /* Animation pour la toolbar */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        
        .toolbar-viewport.animated {
            animation: slideUp 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        Solution Ultime Clavier iOS
    </div>
    
    <div class="info" id="info">
        Chargement...
    </div>
    
    <div class="main-container" id="main-container">
        <div class="editor-container">
            <textarea id="editor" placeholder="Tapez ici - la barre bleue devrait rester au-dessus du clavier..."></textarea>
        </div>
        
        <!-- Toolbar dans le flux normal (vert) -->
        <div class="toolbar-flow">
            <div class="toolbar-buttons">
                <span style="font-size: 12px; font-weight: bold;">FLUX NORMAL</span>
                <button onclick="insertText('Flux! ')">Insérer</button>
                <button onclick="testFunction()">Test</button>
            </div>
        </div>
    </div>
    
    <!-- Toolbar qui suit le viewport (bleu) -->
    <div class="toolbar-viewport" id="toolbar-viewport">
        <div class="toolbar-buttons">
            <span style="font-size: 12px; font-weight: bold;">VISUAL VIEWPORT</span>
            <button onclick="insertText('Viewport! ')">Insérer</button>
            <button onclick="focusEditor()">Focus</button>
            <button onclick="toggleFullscreen()">Plein écran</button>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const info = document.getElementById('info');
        const toolbarViewport = document.getElementById('toolbar-viewport');
        const mainContainer = document.getElementById('main-container');
        
        let keyboardHeight = 0;
        let initialViewportHeight = window.innerHeight;
        
        function updateInfo(msg) {
            const timestamp = new Date().toLocaleTimeString();
            info.textContent = `${timestamp}: ${msg}`;
            console.log(msg);
        }
        
        function insertText(text) {
            const cursorPos = editor.selectionStart;
            const textBefore = editor.value.substring(0, cursorPos);
            const textAfter = editor.value.substring(editor.selectionEnd);
            editor.value = textBefore + text + textAfter;
            editor.selectionStart = editor.selectionEnd = cursorPos + text.length;
            editor.focus();
            updateInfo(`Inséré: "${text}"`);
        }
        
        function testFunction() {
            updateInfo(`Test - Hauteur: ${window.innerHeight}px, Visual: ${window.visualViewport?.height || 'N/A'}px`);
        }
        
        function focusEditor() {
            editor.focus();
            updateInfo('Focus forcé sur éditeur');
        }
        
        function toggleFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            updateInfo('Tentative plein écran');
        }
        
        // SOLUTION PRINCIPALE: Visual Viewport API
        function adjustForKeyboard() {
            if (!window.visualViewport) {
                updateInfo('Visual Viewport API non supporté');
                return;
            }
            
            const viewport = window.visualViewport;
            keyboardHeight = window.innerHeight - viewport.height;
            
            if (keyboardHeight > 100) {
                // Clavier ouvert - positionner la toolbar au-dessus
                toolbarViewport.style.bottom = `${keyboardHeight}px`;
                document.body.classList.add('keyboard-open');
                updateInfo(`Clavier détecté: ${keyboardHeight}px - Toolbar ajustée`);
            } else {
                // Clavier fermé
                toolbarViewport.style.bottom = '0px';
                document.body.classList.remove('keyboard-open');
                updateInfo('Clavier fermé - Toolbar en bas');
            }
        }
        
        // MÉTHODE ALTERNATIVE: Resize detection
        let resizeTimeout;
        function handleResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const currentHeight = window.innerHeight;
                const heightDiff = initialViewportHeight - currentHeight;
                
                if (heightDiff > 150) {
                    // Probablement le clavier
                    toolbarViewport.style.bottom = `${heightDiff - 50}px`;
                    updateInfo(`Resize détecté: ${heightDiff}px - Toolbar ajustée`);
                } else {
                    toolbarViewport.style.bottom = '0px';
                    updateInfo(`Resize normal: ${currentHeight}px`);
                }
            }, 100);
        }
        
        // ÉVÉNEMENTS
        
        // Visual Viewport (iOS 13+)
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustForKeyboard);
            window.visualViewport.addEventListener('scroll', adjustForKeyboard);
            updateInfo('Visual Viewport API activé');
        } else {
            updateInfo('Visual Viewport API non disponible - utilisation resize');
            window.addEventListener('resize', handleResize);
        }
        
        // Focus/Blur
        editor.addEventListener('focus', () => {
            updateInfo('Éditeur focusé');
            // Petit délai pour laisser le clavier s'ouvrir
            setTimeout(adjustForKeyboard, 300);
        });
        
        editor.addEventListener('blur', () => {
            updateInfo('Éditeur perdu focus');
            setTimeout(() => {
                toolbarViewport.style.bottom = '0px';
                document.body.classList.remove('keyboard-open');
            }, 100);
        });
        
        // Orientation
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                initialViewportHeight = window.innerHeight;
                updateInfo(`Orientation changée - Nouvelle hauteur: ${initialViewportHeight}px`);
            }, 500);
        });
        
        // HACK iOS: Forcer le repositionnement
        function forceReposition() {
            if (document.activeElement === editor && keyboardHeight > 100) {
                toolbarViewport.style.bottom = `${keyboardHeight + 10}px`;
                updateInfo('Repositionnement forcé');
            }
        }
        
        // Tentative de repositionnement toutes les secondes quand éditeur focusé
        setInterval(() => {
            if (document.activeElement === editor) {
                adjustForKeyboard();
            }
        }, 1000);
        
        // Initialisation
        window.addEventListener('load', () => {
            initialViewportHeight = window.innerHeight;
            updateInfo(`Chargé - Hauteur: ${initialViewportHeight}px, UA: ${navigator.userAgent.includes('iPhone') ? 'iPhone' : 'Autre'}`);
        });
        
        // Touch events pour debug
        let touchCount = 0;
        document.addEventListener('touchstart', () => {
            touchCount++;
            if (touchCount % 10 === 0) {
                updateInfo(`Touch ${touchCount} - Toolbar bottom: ${toolbarViewport.style.bottom}`);
            }
        });
    </script>
</body>
</html>
