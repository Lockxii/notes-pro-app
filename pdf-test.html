<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PDF Test">
    <title>Test PDF Import - iPhone</title>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Configuration PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow-x: hidden;
            color: white;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .test-container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .test-button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.2s;
            -webkit-tap-highlight-color: rgba(255,255,255,0.3);
            touch-action: manipulation;
        }
        
        .test-button:active {
            transform: scale(0.95);
            background: #0056b3;
        }
        
        .result-area {
            background: rgba(255,255,255,0.9);
            color: #333;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            min-height: 200px;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 300px;
        }
        
        .debug-info {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .step {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid #34C759;
        }
        
        .step h3 {
            color: #34C759;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 Test PDF Import</h1>
        <p>Test d'import PDF pour iPhone</p>
    </div>
    
    <div class="step">
        <h3>Étape 1: Test du sélecteur de fichier</h3>
        <button class="test-button" id="select-pdf-btn">📄 Sélectionner un PDF</button>
        <input type="file" id="pdf-input" accept=".pdf">
        <div class="debug-info" id="file-debug">
            Aucun fichier sélectionné
        </div>
    </div>
    
    <div class="step">
        <h3>Étape 2: Extraction du texte</h3>
        <div class="debug-info" id="extraction-debug">
            En attente de fichier...
        </div>
    </div>
    
    <div class="step">
        <h3>Étape 3: Résultat brut</h3>
        <div class="result-area" id="result-area">
            Le texte extrait du PDF apparaîtra ici...
        </div>
    </div>
    
    <div class="step">
        <h3>Étape 4: Texte propre (éditable)</h3>
        <textarea id="clean-text-area" placeholder="Le texte nettoyé apparaîtra ici. Tu peux l'éditer avant de l'utiliser." style="
            background: rgba(255,255,255,0.95);
            color: #333;
            border: 2px solid #007AFF;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            min-height: 200px;
            font-size: 16px;
            line-height: 1.5;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            resize: vertical;
            box-sizing: border-box;
        "></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="test-button" onclick="reCleanText()" style="flex: 1;">🧹 Re-nettoyer</button>
            <button class="test-button" onclick="copyCleanText()" style="flex: 1;">📋 Copier</button>
        </div>
    </div>
    
    <div class="test-container">
        <h3>🔧 Actions de test</h3>
        <button class="test-button" onclick="clearResults()">🗑️ Nettoyer les résultats</button>
        <button class="test-button" onclick="showDebugInfo()">🐞 Infos debug</button>
        <button class="test-button" onclick="showRawText()">📝 Voir texte brut</button>
    </div>
    
    <script>
        // Variables globales
        let selectedFile = null;
        let rawPdfText = '';
        
        // Debug info
        function showDebugInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                fileSupport: 'File' in window,
                fileReaderSupport: 'FileReader' in window,
                touchSupport: 'ontouchstart' in window,
                viewport: {
                    width: window.innerWidth,
                    height: window.innerHeight
                }
            };
            
            document.getElementById('extraction-debug').innerHTML = 
                '<strong>Debug Info:</strong><br>' + JSON.stringify(info, null, 2);
        }
        
        // Nettoyer les résultats
        function clearResults() {
            document.getElementById('result-area').textContent = 'Le texte extrait du PDF apparaîtra ici...';
            document.getElementById('file-debug').textContent = 'Aucun fichier sélectionné';
            document.getElementById('extraction-debug').textContent = 'En attente de fichier...';
            selectedFile = null;
            rawPdfText = '';
        }
        
        // Voir le texte brut
        function showRawText() {
            if (rawPdfText) {
                const sample = rawPdfText.substring(0, 2000);
                document.getElementById('result-area').textContent = 
                    '=== TEXTE BRUT (premiers 2000 caractères) ===\n\n' + sample;
            } else {
                document.getElementById('result-area').textContent = 
                    'Aucun texte brut disponible. Sélectionnez d\'abord un PDF.';
            }
        }
        
        // Nettoyer et formater le texte automatiquement (optimisé pour PDF.js)
        function cleanExtractedText(rawText) {
            if (!rawText) return '';
            
            let cleaned = rawText
                // Nettoyer les marqueurs de page résiduels
                .replace(/--- Page \d+ ---/g, '')
                // Normaliser les retours à la ligne
                .replace(/\n{3,}/g, '\n\n')
                .replace(/\n\s*\n/g, '\n\n')
                // Nettoyer les espaces multiples
                .replace(/\s+/g, ' ')
                // Nettoyer les espaces autour de la ponctuation
                .replace(/\s+([.,!?;:])/g, '$1')
                .replace(/([.,!?;:])\s*/g, '$1 ')
                // Corriger les mots collés (détection basique)
                .replace(/([a-z])([A-Z])/g, '$1 $2')
                // Ajouter des points à la fin des phrases si manquants
                .replace(/([a-zA-ZÀ-ÿ])\s+([A-ZÀ-Ÿ])/g, '$1. $2')
                // Supprimer les lignes trop courtes (probablement des artefacts)
                .split('\n')
                .filter(line => line.trim().length > 3)
                .join('\n')
                // Nettoyer les caractères de contrôle restants
                .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
                // Trim final et normaliser les espaces
                .trim()
                .replace(/\s+/g, ' ');
            
            return cleaned;
        }
        
        // Re-nettoyer le texte
        function reCleanText() {
            const resultArea = document.getElementById('result-area');
            const cleanTextArea = document.getElementById('clean-text-area');
            
            // Prendre le texte brut du résultat ou le texte déjà dans le champ
            let textToClean = cleanTextArea.value || resultArea.textContent;
            
            if (!textToClean.trim()) {
                alert('Aucun texte à nettoyer !');
                return;
            }
            
            const cleaned = cleanExtractedText(textToClean);
            cleanTextArea.value = cleaned;
            
            // Feedback visuel
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = '✨ Nettoyé !';
            button.style.background = '#34C759';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.background = '#007AFF';
            }, 1500);
        }
        
        // Copier le texte propre
        async function copyCleanText() {
            const cleanTextArea = document.getElementById('clean-text-area');
            const text = cleanTextArea.value;
            
            if (!text.trim()) {
                alert('Aucun texte à copier !');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(text);
                // Feedback visuel
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = '✅ Copié !';
                button.style.background = '#34C759';
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.background = '#007AFF';
                }, 2000);
            } catch (err) {
                // Fallback pour les navigateurs qui ne supportent pas clipboard API
                cleanTextArea.select();
                document.execCommand('copy');
                alert('Texte copié dans le presse-papiers !');
            }
        }
        
        // Gestion de la sélection de fichier
        document.getElementById('select-pdf-btn').addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Bouton PDF cliqué');
            document.getElementById('pdf-input').click();
        });
        
        // Gestion du changement de fichier
        document.getElementById('pdf-input').addEventListener('change', function(event) {
            const files = event.target.files;
            console.log('Fichiers sélectionnés:', files.length);
            
            if (files.length > 0) {
                selectedFile = files[0];
                
                // Affichage des infos du fichier
                const fileInfo = `
Nom: ${selectedFile.name}
Taille: ${(selectedFile.size / 1024).toFixed(2)} KB
Type: ${selectedFile.type}
Dernière modification: ${new Date(selectedFile.lastModified).toLocaleString()}
                `;
                
                document.getElementById('file-debug').innerHTML = 
                    '<strong>Fichier sélectionné:</strong><br>' + fileInfo;
                
                // Lancer l'extraction
                extractTextFromPDF(selectedFile);
            }
        });
        
        // Fonction d'extraction de texte PDF avec PDF.js (BEAUCOUP plus fiable !)
        async function extractTextFromPDF(file) {
            try {
                document.getElementById('extraction-debug').innerHTML = 
                    '<strong>🔄 Extraction en cours...</strong><br>Chargement avec PDF.js...';
                
                const arrayBuffer = await file.arrayBuffer();
                
                // Charger le PDF avec PDF.js
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                document.getElementById('extraction-debug').innerHTML += 
                    `<br>PDF chargé: ${pdf.numPages} pages détectées`;
                
                let fullText = '';
                let pagesProcessed = 0;
                
                // Extraire le texte de chaque page
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    try {
                        const page = await pdf.getPage(pageNum);
                        const textContent = await page.getTextContent();
                        
                        // Assembler le texte de la page
                        let pageText = '';
                        textContent.items.forEach(item => {
                            if (item.str) {
                                pageText += item.str + ' ';
                            }
                        });
                        
                        // Ajouter le texte de la page au texte complet
                        if (pageText.trim()) {
                            fullText += `\n\n--- Page ${pageNum} ---\n${pageText.trim()}`;
                        }
                        
                        pagesProcessed++;
                        
                        // Mise à jour du progress
                        document.getElementById('extraction-debug').innerHTML = 
                            `<strong>🔄 Extraction en cours...</strong><br>
                            PDF chargé: ${pdf.numPages} pages détectées<br>
                            Pages traitées: ${pagesProcessed}/${pdf.numPages}`;
                        
                    } catch (pageError) {
                        console.warn(`Erreur page ${pageNum}:`, pageError);
                        fullText += `\n\n--- Page ${pageNum} (erreur) ---\n[Impossible de lire cette page]`;
                    }
                }
                
                // Sauvegarder pour le debug
                rawPdfText = fullText;
                
                // Nettoyage basique
                let extractedText = fullText
                    .replace(/\n\n--- Page \d+ ---\n/g, '\n\n')  // Supprimer les marqueurs de page
                    .replace(/\s+/g, ' ')  // Normaliser les espaces
                    .trim();
                
                // Affichage des résultats
                const debugInfo = `
<strong>✅ Extraction terminée avec PDF.js</strong><br>
Pages total: ${pdf.numPages}<br>
Pages traitées: ${pagesProcessed}<br>
Caractères extraits: ${extractedText.length}<br>
Méthode: PDF.js TextContent API
                `;
                
                document.getElementById('extraction-debug').innerHTML = debugInfo;
                
                if (extractedText.trim()) {
                    // Afficher le résultat brut (limité)
                    const displayText = extractedText.length > 1000 
                        ? extractedText.substring(0, 1000) + '\n\n[... texte tronqué - voir champ éditable pour le texte complet ...]'
                        : extractedText;
                    
                    document.getElementById('result-area').textContent = displayText.trim();
                    
                    // Nettoyer automatiquement et remplir le champ éditable
                    const cleanedText = cleanExtractedText(extractedText);
                    document.getElementById('clean-text-area').value = cleanedText;
                    
                    // Scroll vers le champ propre
                    document.getElementById('clean-text-area').scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'center' 
                    });
                    
                } else {
                    document.getElementById('result-area').innerHTML = 
                        '<em style="color: #FF3B30;">❌ Aucun texte trouvé dans ce PDF.<br>Le fichier pourrait être composé uniquement d\'images ou être protégé.</em>';
                    
                    document.getElementById('clean-text-area').value = '';
                }
                
            } catch (error) {
                console.error('Erreur lors de l\'extraction:', error);
                document.getElementById('extraction-debug').innerHTML = 
                    '<strong style="color: #FF3B30;">❌ Erreur PDF.js:</strong><br>' + error.message;
                document.getElementById('result-area').innerHTML = 
                    '<em style="color: #FF3B30;">Erreur lors de la lecture du PDF avec PDF.js.</em>';
            }
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page de test PDF chargée');
            showDebugInfo();
        });
    </script>
</body>
</html>
