<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PDF Test">
    <title>Test PDF Import - iPhone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow-x: hidden;
            color: white;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .test-container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .test-button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: all 0.2s;
            -webkit-tap-highlight-color: rgba(255,255,255,0.3);
            touch-action: manipulation;
        }
        
        .test-button:active {
            transform: scale(0.95);
            background: #0056b3;
        }
        
        .result-area {
            background: rgba(255,255,255,0.9);
            color: #333;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            min-height: 200px;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 300px;
        }
        
        .debug-info {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .step {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid #34C759;
        }
        
        .step h3 {
            color: #34C759;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 Test PDF Import</h1>
        <p>Test d'import PDF pour iPhone</p>
    </div>
    
    <div class="step">
        <h3>Étape 1: Test du sélecteur de fichier</h3>
        <button class="test-button" id="select-pdf-btn">📄 Sélectionner un PDF</button>
        <input type="file" id="pdf-input" accept=".pdf">
        <div class="debug-info" id="file-debug">
            Aucun fichier sélectionné
        </div>
    </div>
    
    <div class="step">
        <h3>Étape 2: Extraction du texte</h3>
        <div class="debug-info" id="extraction-debug">
            En attente de fichier...
        </div>
    </div>
    
    <div class="step">
        <h3>Étape 3: Résultat brut</h3>
        <div class="result-area" id="result-area">
            Le texte extrait du PDF apparaîtra ici...
        </div>
    </div>
    
    <div class="step">
        <h3>Étape 4: Texte propre (éditable)</h3>
        <textarea id="clean-text-area" placeholder="Le texte nettoyé apparaîtra ici. Tu peux l'éditer avant de l'utiliser." style="
            background: rgba(255,255,255,0.95);
            color: #333;
            border: 2px solid #007AFF;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            min-height: 200px;
            font-size: 16px;
            line-height: 1.5;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            resize: vertical;
            box-sizing: border-box;
        "></textarea>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="test-button" onclick="reCleanText()" style="flex: 1;">🧹 Re-nettoyer</button>
            <button class="test-button" onclick="copyCleanText()" style="flex: 1;">📋 Copier</button>
        </div>
    </div>
    
    <div class="test-container">
        <h3>🔧 Actions de test</h3>
        <button class="test-button" onclick="clearResults()">🗑️ Nettoyer les résultats</button>
        <button class="test-button" onclick="showDebugInfo()">🐞 Infos debug</button>
        <button class="test-button" onclick="showRawText()">📝 Voir texte brut</button>
    </div>
    
    <script>
        // Variables globales
        let selectedFile = null;
        let rawPdfText = '';
        
        // Debug info
        function showDebugInfo() {
            const info = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                fileSupport: 'File' in window,
                fileReaderSupport: 'FileReader' in window,
                touchSupport: 'ontouchstart' in window,
                viewport: {
                    width: window.innerWidth,
                    height: window.innerHeight
                }
            };
            
            document.getElementById('extraction-debug').innerHTML = 
                '<strong>Debug Info:</strong><br>' + JSON.stringify(info, null, 2);
        }
        
        // Nettoyer les résultats
        function clearResults() {
            document.getElementById('result-area').textContent = 'Le texte extrait du PDF apparaîtra ici...';
            document.getElementById('file-debug').textContent = 'Aucun fichier sélectionné';
            document.getElementById('extraction-debug').textContent = 'En attente de fichier...';
            selectedFile = null;
            rawPdfText = '';
        }
        
        // Voir le texte brut
        function showRawText() {
            if (rawPdfText) {
                const sample = rawPdfText.substring(0, 2000);
                document.getElementById('result-area').textContent = 
                    '=== TEXTE BRUT (premiers 2000 caractères) ===\n\n' + sample;
            } else {
                document.getElementById('result-area').textContent = 
                    'Aucun texte brut disponible. Sélectionnez d\'abord un PDF.';
            }
        }
        
        // Nettoyer et formater le texte automatiquement
        function cleanExtractedText(rawText) {
            if (!rawText) return '';
            
            let cleaned = rawText
                // Supprimer les caractères de contrôle et non-imprimables
                .replace(/[\x00-\x1F\x7F-\x9F]/g, ' ')
                // Supprimer les caractères spéciaux PDF
                .replace(/[^\w\sÀ-ÿ.,!?;:()\-'"]/g, ' ')
                // Nettoyer les espaces multiples
                .replace(/\s+/g, ' ')
                // Supprimer les mots trop courts ou suspects
                .split(' ')
                .filter(word => word.length > 1 && !/^[^a-zA-ZÀ-ÿ]+$/.test(word))
                .join(' ')
                // Ajouter des points à la fin des phrases si manquants
                .replace(/([a-zA-ZÀ-ÿ])\s+([A-ZÀ-Ÿ])/g, '$1. $2')
                // Nettoyer les espaces autour de la ponctuation
                .replace(/\s+([.,!?;:])/g, '$1')
                .replace(/([.,!?;:])\s*/g, '$1 ')
                // Trim final
                .trim();
            
            return cleaned;
        }
        
        // Re-nettoyer le texte
        function reCleanText() {
            const resultArea = document.getElementById('result-area');
            const cleanTextArea = document.getElementById('clean-text-area');
            
            // Prendre le texte brut du résultat ou le texte déjà dans le champ
            let textToClean = cleanTextArea.value || resultArea.textContent;
            
            if (!textToClean.trim()) {
                alert('Aucun texte à nettoyer !');
                return;
            }
            
            const cleaned = cleanExtractedText(textToClean);
            cleanTextArea.value = cleaned;
            
            // Feedback visuel
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = '✨ Nettoyé !';
            button.style.background = '#34C759';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.background = '#007AFF';
            }, 1500);
        }
        
        // Copier le texte propre
        async function copyCleanText() {
            const cleanTextArea = document.getElementById('clean-text-area');
            const text = cleanTextArea.value;
            
            if (!text.trim()) {
                alert('Aucun texte à copier !');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(text);
                // Feedback visuel
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = '✅ Copié !';
                button.style.background = '#34C759';
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.background = '#007AFF';
                }, 2000);
            } catch (err) {
                // Fallback pour les navigateurs qui ne supportent pas clipboard API
                cleanTextArea.select();
                document.execCommand('copy');
                alert('Texte copié dans le presse-papiers !');
            }
        }
        
        // Gestion de la sélection de fichier
        document.getElementById('select-pdf-btn').addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Bouton PDF cliqué');
            document.getElementById('pdf-input').click();
        });
        
        // Gestion du changement de fichier
        document.getElementById('pdf-input').addEventListener('change', function(event) {
            const files = event.target.files;
            console.log('Fichiers sélectionnés:', files.length);
            
            if (files.length > 0) {
                selectedFile = files[0];
                
                // Affichage des infos du fichier
                const fileInfo = `
Nom: ${selectedFile.name}
Taille: ${(selectedFile.size / 1024).toFixed(2)} KB
Type: ${selectedFile.type}
Dernière modification: ${new Date(selectedFile.lastModified).toLocaleString()}
                `;
                
                document.getElementById('file-debug').innerHTML = 
                    '<strong>Fichier sélectionné:</strong><br>' + fileInfo;
                
                // Lancer l'extraction
                extractTextFromPDF(selectedFile);
            }
        });
        
        // Fonction d'extraction de texte PDF (version améliorée)
        async function extractTextFromPDF(file) {
            try {
                document.getElementById('extraction-debug').innerHTML = 
                    '<strong>🔄 Extraction en cours...</strong><br>Lecture du fichier PDF...';
                
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                // Conversion en string avec décodage UTF-8 et Latin-1
                let text = '';
                let textLatin = '';
                
                // Essayer UTF-8
                try {
                    const decoder = new TextDecoder('utf-8');
                    text = decoder.decode(uint8Array);
                } catch (e) {
                    // Fallback vers Latin-1
                    const decoder = new TextDecoder('latin1');
                    textLatin = decoder.decode(uint8Array);
                }
                
                // Si UTF-8 n'a pas marché, utiliser Latin-1
                if (!text) text = textLatin;
                
                // Sauvegarder pour le debug
                rawPdfText = text;
                
                document.getElementById('extraction-debug').innerHTML += 
                    '<br>Décodage terminé, recherche de texte...';
                
                let extractedText = '';
                
                // Méthode 1: Texte entre parenthèses (standard PDF)
                const parenthesesMatches = text.match(/\(([^)]*)\)/g);
                if (parenthesesMatches) {
                    parenthesesMatches.forEach(match => {
                        const content = match.replace(/[()]/g, '');
                        // Filtrer le contenu lisible
                        if (content.length > 1 && /[a-zA-ZÀ-ÿ]/.test(content)) {
                            extractedText += content + ' ';
                        }
                    });
                }
                
                // Méthode 2: Texte entre crochets
                const bracketMatches = text.match(/\[([^\]]*)\]/g);
                if (bracketMatches) {
                    bracketMatches.forEach(match => {
                        const content = match.replace(/[\[\]]/g, '');
                        if (content.length > 1 && /[a-zA-ZÀ-ÿ]/.test(content)) {
                            extractedText += content + ' ';
                        }
                    });
                }
                
                // Méthode 3: Recherche de séquences "Tj" (commande PDF pour afficher du texte)
                const tjMatches = text.match(/\(([^)]+)\)\s*Tj/g);
                if (tjMatches) {
                    tjMatches.forEach(match => {
                        const content = match.replace(/\(([^)]+)\)\s*Tj/, '$1');
                        if (content.length > 1 && /[a-zA-ZÀ-ÿ]/.test(content)) {
                            extractedText += content + ' ';
                        }
                    });
                }
                
                // Méthode 4: Recherche de mots dans les streams décompressés
                const streamMatches = text.match(/stream[\s\S]*?endstream/g);
                if (streamMatches) {
                    streamMatches.forEach(stream => {
                        // Chercher du texte lisible dans les streams
                        const words = stream.match(/[a-zA-ZÀ-ÿ]{3,}/g);
                        if (words) {
                            words.forEach(word => {
                                if (word.length > 2 && extractedText.indexOf(word) === -1) {
                                    extractedText += word + ' ';
                                }
                            });
                        }
                    });
                }
                
                // Méthode 5: Extraction directe de mots (fallback)
                if (extractedText.length < 20) {
                    const directWords = text.match(/\b[a-zA-ZÀ-ÿ]{3,}\b/g);
                    if (directWords) {
                        // Prendre les 50 premiers mots uniques
                        const uniqueWords = [...new Set(directWords.slice(0, 50))];
                        extractedText += uniqueWords.join(' ');
                    }
                }
                
                // Nettoyage final
                extractedText = extractedText
                    .replace(/\s+/g, ' ')
                    .replace(/[^\w\sÀ-ÿ.,!?;:-]/g, '')
                    .trim();
                
                // Affichage des résultats
                const debugInfo = `
<strong>✅ Extraction terminée</strong><br>
Taille du buffer: ${arrayBuffer.byteLength} bytes<br>
Texte brut trouvé: ${text.length} caractères<br>
Texte extrait: ${extractedText.length} caractères<br>
Parenthèses trouvées: ${parenthesesMatches ? parenthesesMatches.length : 0}<br>
Crochets trouvés: ${bracketMatches ? bracketMatches.length : 0}<br>
Commandes Tj: ${tjMatches ? tjMatches.length : 0}<br>
Streams: ${streamMatches ? streamMatches.length : 0}
                `;
                
                document.getElementById('extraction-debug').innerHTML = debugInfo;
                
                if (extractedText.trim()) {
                    // Afficher le résultat brut (limité)
                    const displayText = extractedText.length > 1000 
                        ? extractedText.substring(0, 1000) + '\n\n[... texte tronqué ...]'
                        : extractedText;
                    
                    document.getElementById('result-area').textContent = displayText.trim();
                    
                    // Nettoyer automatiquement et remplir le champ éditable
                    const cleanedText = cleanExtractedText(extractedText);
                    document.getElementById('clean-text-area').value = cleanedText;
                    
                    // Scroll vers le champ propre
                    document.getElementById('clean-text-area').scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'center' 
                    });
                    
                } else {
                    document.getElementById('result-area').innerHTML = 
                        '<em style="color: #FF3B30;">❌ Impossible d\'extraire le texte de ce PDF.<br>Le fichier pourrait être protégé, crypté ou dans un format non supporté.</em>';
                    
                    document.getElementById('clean-text-area').value = '';
                }
                
            } catch (error) {
                console.error('Erreur lors de l\'extraction:', error);
                document.getElementById('extraction-debug').innerHTML = 
                    '<strong style="color: #FF3B30;">❌ Erreur:</strong><br>' + error.message;
                document.getElementById('result-area').innerHTML = 
                    '<em style="color: #FF3B30;">Erreur lors de la lecture du PDF.</em>';
            }
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page de test PDF chargée');
            showDebugInfo();
        });
    </script>
</body>
</html>
